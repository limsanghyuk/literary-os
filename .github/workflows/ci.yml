name: CI

on:
  push:
    branches: [ main, "release/**", "feat/**" ]
  pull_request:
    branches: [ main ]

jobs:
  preflight:
    name: Preflight Step 13 (Dependency Audit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install dev dependencies
        run: pip install -e ".[dev]"
      - name: Run Preflight Step 13
        run: python tools/preflight_step13.py --strict

  test:
    name: Test Suite (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    needs: preflight
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install dependencies
        run: pip install -e ".[dev]"
      - name: Run test suite
        run: pytest tests/ -q --tb=short --timeout=120
      - name: Verify release gates
        run: |
          python -c "
          from literary_system.gates.release_gate import run_release_gate
          r = run_release_gate()
          assert r['gates_passed'] == r['total_gates'], f\"Gates FAIL: {r['gates_passed']}/{r['total_gates']}\"
          print(f\"Gates OK: {r['gates_passed']}/{r['total_gates']}\")
          "

  integrity:
    name: SHA256 Integrity Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify SHA256SUMS
        run: sha256sum -c SHA256SUMS.txt.sig && echo "Integrity OK"
