# literary-os CI — V580 표준 워크플로
# 트리거: main/develop push, PR, 번호-주제 브랜치
name: CI

on:
  push:
    branches:
      - main
      - develop
      - "[0-9]*-*"          # /581-async-fix, /582-perf 형태
  pull_request:
    branches:
      - main
      - develop

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── 1. 린트 ─────────────────────────────────────────────────────────────────
  lint:
    name: Ruff Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.11", cache: pip }
      - run: pip install "ruff>=0.6" --quiet
      - run: ruff check literary_system/ --select E,F,W,I --ignore E501,F401,F811

  # ── 2. 버전 정합성 ───────────────────────────────────────────────────────────
  version-check:
    name: Version Consistency
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.11" }
      - run: python tools/check_version_consistency.py --strict

  # ── 3. Dependency Preflight ──────────────────────────────────────────────────
  preflight:
    name: Dependency Preflight (Step 13-15)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.11", cache: pip }
      - run: pip install -e ".[dev]" --quiet
      - run: python tools/preflight_step13.py --strict
      - run: python tools/preflight_step14.py --strict
      - run: python tools/preflight_step15.py --strict

  # ── 4. 테스트 + Release Gate ─────────────────────────────────────────────────
  test:
    name: Test Suite (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    needs: [lint, version-check, preflight]
    strategy:
      fail-fast: true
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - run: pip install -e ".[dev]" --quiet
      - name: pytest
        run: pytest tests/ -q --tb=short --timeout=120
      - name: Release Gate (38 Gates)
        run: |
          python - << 'PYEOF'
          from literary_system.gates.release_gate import run_release_gate
          r = run_release_gate()
          total = r["total_gates"]
          passed = r["gates_passed"]
          failed_gates = [k for k,v in r["results"].items() if not v.get("pass")]
          assert passed == total, f"Gates FAIL ({passed}/{total}): {failed_gates}"
          print(f"Release Gates OK: {passed}/{total}")
          PYEOF

  # ── 5. (PR 전용) 보안 회귀 빠른 체크 ───────────────────────────────────────
  security-quick:
    name: Security Quick Check
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.11", cache: pip }
      - run: pip install -e ".[dev]" --quiet
      - name: DEV_MODE 기본값 false 확인
        run: |
          python -c "
          from literary_system.gates.release_gate import _gate_auth_regression_g34
          r = _gate_auth_regression_g34()
          assert r['pass'], f'DEV_MODE 보안 회귀: {r[\"details\"]}'
          print('DEV_MODE OK')
          "
