# V587: post-tag GitHub Release 자동 생성 (ADR-048)
name: Release

on:
  push:
    tags:
      - 'v*.*.*-V*'

permissions:
  contents: write

jobs:
  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract version info
        id: info
        run: |
          TAG="${{ github.ref_name }}"
          SEMVER=$(echo "$TAG" | grep -oP '\d+\.\d+\.\d+' | head -1)
          VNUM=$(echo "$TAG" | grep -oP 'V\d+' | head -1)
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "semver=$SEMVER" >> $GITHUB_OUTPUT
          echo "vnum=$VNUM" >> $GITHUB_OUTPUT

      - name: Extract changelog section
        id: changelog
        run: |
          python tools/extract_changelog_section.py \
            --version "${{ steps.info.outputs.semver }}" \
            --output /tmp/release_body.md || echo "No changelog entry found"
          if [ -f /tmp/release_body.md ]; then
            echo "body_file=/tmp/release_body.md" >> $GITHUB_OUTPUT
          fi

      - name: Create GitHub Release
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ steps.info.outputs.tag }}
          name: "${{ steps.info.outputs.vnum }} (v${{ steps.info.outputs.semver }})"
          bodyFile: ${{ steps.changelog.outputs.body_file }}
          draft: false
          prerelease: false
          token: ${{ secrets.GITHUB_TOKEN }}
