name: Agent Ensemble Eval (C-M-08)

on:
  pull_request:
    paths:
      - "literary_system/agents/**"
      - "literary_system/ensemble/**"
      - "literary_system/gates/coordinator_gate.py"
      - "literary_system/gates/evaluator_gate.py"

jobs:
  ensemble-eval:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -e ".[dev]" --break-system-packages 2>/dev/null || pip install -e ".[dev]"

      - name: Run SP-C.2 Agent Ensemble unit tests
        run: |
          python -m pytest tests/unit/test_v648_critic_agent.py \
            tests/unit/test_v649_editor_agent.py \
            tests/unit/test_v650_agent_coordinator.py \
            tests/unit/test_v651_memory_cache.py \
            tests/unit/test_v652_ensemble_evaluator.py \
            tests/unit/test_v653_safety_guard.py \
            tests/unit/test_v654_mae_multiwork_gate.py \
            tests/unit/test_v655_suite_registration_gate.py \
            -v --tb=short

      - name: Run G65/G66/G67 gate validation
        run: |
          python - << 'EOF'
          from literary_system.ensemble.mae_multiwork_gate import MAEMultiWorkGate, ProjectRunSpec
          from literary_system.ensemble.suite_registration_gate import SuiteRegistrationGate

          # G66 smoke test
          gate66 = MAEMultiWorkGate()
          specs = [ProjectRunSpec(project_id=f"p{i}", scenes=[{"scene_id": f"s{i}"}]) for i in range(3)]
          r66 = gate66.run_gate(specs)
          assert r66.passed, f"G66 FAIL: {r66.failure_reason}"
          print(f"G66 PASS — P95={r66.p95_latency_sec:.3f}s")

          # G67 smoke test
          gate67 = SuiteRegistrationGate()
          r67 = gate67.run_gate(
              gates_passed=["G64", "G65", "G66"],
              ensemble_score=0.85,
              test_count=600,
              atia_score=0.80,
          )
          assert r67.passed, f"G67 FAIL: {r67.failure_reasons}"
          print("G67 PASS — SP-C.2 게이트 전체 통과")
          EOF
