# Literary OS ServePlane Helm Values
# ADR-057 §5 참조 — B-M-16 TrainPlane/ServePlane 격리
# LLM-1: PROMOTED 단계 모델만 서빙 허용 (ADR-058)

# ---------------------------------------------------------------------------
# 이미지 설정
# ---------------------------------------------------------------------------
image:
  repository: ghcr.io/limsanghyuk/literary-os-server
  tag: "10.31.0"
  pullPolicy: IfNotPresent

# ---------------------------------------------------------------------------
# 서빙 엔드포인트 설정
# ---------------------------------------------------------------------------
serving:
  # 서비스 포트
  port: 8080
  # 워커 수 (CPU 코어 기반)
  workers: 4
  # 요청 타임아웃 (초)
  timeoutSec: 30
  # 최대 동시 요청
  maxConcurrent: 100
  # 로깅 레벨
  logLevel: "INFO"

# ---------------------------------------------------------------------------
# 모델 설정 (LLM-1: PROMOTED 단계만 허용)
# ---------------------------------------------------------------------------
model:
  # 기반 모델
  baseModel: "meta-llama/Llama-3.1-8B"
  # 모델 마운트 경로
  modelMount: "/models/lora"
  # PROMOTED 상태만 서빙 허용 (ADR-058)
  requirePromoted: true
  # 최대 시퀀스 길이
  maxSeqLen: 2048
  # 배치 크기
  batchSize: 8
  # LoRA 스태킹 최대 레이어 수
  maxLoraLayers: 4

# ---------------------------------------------------------------------------
# 리플리카 및 오토스케일링 (HPA)
# ---------------------------------------------------------------------------
replicaCount: 2

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 8
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80

# ---------------------------------------------------------------------------
# CPU/메모리 리소스 (ServePlane — GPU 없음, CPU 추론)
# ---------------------------------------------------------------------------
resources:
  requests:
    memory: "8Gi"
    cpu: "2"
  limits:
    memory: "16Gi"
    cpu: "4"

# ---------------------------------------------------------------------------
# 상태 확인 (Health Check)
# ---------------------------------------------------------------------------
healthCheck:
  enabled: true
  livenessPath: "/health/live"
  readinessPath: "/health/ready"
  initialDelaySeconds: 30
  periodSeconds: 10
  failureThreshold: 3

# ---------------------------------------------------------------------------
# 스토리지
# ---------------------------------------------------------------------------
persistence:
  models:
    storageClass: "standard"
    size: "20Gi"
    accessMode: ReadOnlyMany

# ---------------------------------------------------------------------------
# 보안 격리 (TrainPlane 네임스페이스와 분리)
# ---------------------------------------------------------------------------
namespace: "literary-serve"
serviceAccount:
  create: true
  name: "literary-server"

# ---------------------------------------------------------------------------
# 서비스 설정
# ---------------------------------------------------------------------------
service:
  type: ClusterIP
  port: 80
  targetPort: 8080

# ---------------------------------------------------------------------------
# 노드 선택 (CPU 전용 노드 — GPU 학습 노드와 분리)
# ---------------------------------------------------------------------------
nodeSelector:
  workload-type: "cpu-serving"

tolerations: []

# ---------------------------------------------------------------------------
# 카나리 배포 설정 (ADR-058 §3)
# ---------------------------------------------------------------------------
canary:
  enabled: false
  weight: 0
  stableWeight: 100
