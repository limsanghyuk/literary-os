[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "literary-os"
version = "6.5.0"
description = "Literary OS V525 — Phase3 NIE v2.0 Full Build (Narrative Intelligence Engine)"
readme = "README.md"
requires-python = ">=3.10"
license = {text = "MIT"}
keywords = ["literary", "narrative", "ai", "korean-drama", "story-generation"]
dependencies = [
    "networkx>=3.0",
    "pydantic>=2.0.0",
]

[project.optional-dependencies]
semantic = ["scikit-learn>=1.3"]
llm = ["anthropic>=0.20", "langchain-anthropic", "langchain-core"]
server = ["fastapi>=0.100", "uvicorn[standard]>=0.20"]
dev = [
    "pytest>=8",
    "pytest-cov>=4",
    "scikit-learn>=1.3",
]

[project.scripts]
literary-os = "apps.studio_api.main:cli_entry"

[tool.pytest.ini_options]
pythonpath = ["."]
testpaths = ["tests"]
addopts = "--tb=short -q"

[tool.setuptools.packages.find]
where = ["."]
include = ["literary_system*", "apps*"]
