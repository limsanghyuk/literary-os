[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "literary-os"
version = "8.4.0"
description = "Literary OS V576 — Test Fortification: 0% coverage units, G32/G33/G34 gates, 5529 PASS 33 Gates"
readme = "README.md"
requires-python = ">=3.10"
license = {text = "MIT"}
keywords = ["literary", "narrative", "ai", "korean-drama", "story-generation"]
dependencies = [
    "networkx>=3.0",
    "pydantic>=2.0.0",
]

[project.optional-dependencies]
semantic = ["scikit-learn>=1.3"]
llm = ["anthropic>=0.20", "langchain-anthropic", "langchain-core"]
server = ["fastapi>=0.100", "uvicorn[standard]>=0.20"]
dev = [
    "pytest>=8",
    "pytest-cov>=4",
    "pytest-timeout>=2.3",
    "pytest-asyncio>=0.23",
    "scikit-learn>=1.3",
    "fastapi>=0.100",
    "uvicorn[standard]>=0.20",
    "httpx>=0.24",
    "numpy>=1.24",
    "ruff>=0.4",
]

[project.scripts]
literary-os = "apps.studio_api.main:cli_entry"

[tool.pytest.ini_options]
pythonpath = ["."]
testpaths = ["tests"]
addopts = "--tb=short -q"
asyncio_mode = "auto"

[tool.setuptools.packages.find]
where = ["."]
include = ["literary_system*", "apps*"]

[tool.ruff]
line-length = 120
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "W", "I"]
ignore = ["E501", "F401", "F811"]
